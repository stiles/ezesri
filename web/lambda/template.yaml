AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: ezesri Web API - Extract data from Esri REST services

Globals:
  Function:
    Timeout: 29  # API Gateway max timeout
    MemorySize: 3008  # More memory = faster CPU
    Runtime: python3.11

Resources:
  ExportBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "ezesri-exports-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldExports
            Status: Enabled
            ExpirationInDays: 1
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ['*']
            AllowedMethods: [GET, HEAD]
            AllowedHeaders: ['*']
            MaxAge: 3600
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: ezesri

  ExtractFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./
      Handler: handler.lambda_handler
      Description: ezesri web API for extracting Esri REST data
      Layers:
        - arn:aws:lambda:us-west-2:399949164916:layer:shapely-python311:1
      Environment:
        Variables:
          EXPORT_BUCKET: !Ref ExportBucket
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ExportBucket
      Events:
        MetadataApi:
          Type: Api
          Properties:
            Path: /metadata
            Method: get
            RestApiId: !Ref EzesriApi
        MetadataOptions:
          Type: Api
          Properties:
            Path: /metadata
            Method: options
            RestApiId: !Ref EzesriApi
        ExtractApi:
          Type: Api
          Properties:
            Path: /extract
            Method: post
            RestApiId: !Ref EzesriApi
        ExtractOptions:
          Type: Api
          Properties:
            Path: /extract
            Method: options
            RestApiId: !Ref EzesriApi
        RootApi:
          Type: Api
          Properties:
            Path: /
            Method: get
            RestApiId: !Ref EzesriApi
        RootOptions:
          Type: Api
          Properties:
            Path: /
            Method: options
            RestApiId: !Ref EzesriApi
      Tags:
        Project: ezesri

  EzesriApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET, POST, OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"
      Description: ezesri Web API

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${EzesriApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  
  FunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt ExtractFunction.Arn
